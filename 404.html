<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Page Not Found — Pratibha Raju Prem Kumar</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to Pratibha Raju Prem Kumar's portfolio." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#5a6e8a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 22px;
    }
    .error-content {
      max-width: 520px;
    }
    .error-code {
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--gray-4);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .error-desc {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page not found</h1>
      <p class="error-desc">
        The page you're looking for doesn't exist or has been moved.
        Let's get you back on track.
      </p>
      <div class="error-actions">
        <a href="/" class="btn btn-filled"><i class="fas fa-home" aria-hidden="true"></i> Back to Home</a>
        <a href="/blog.html" class="btn btn-outline"><i class="fas fa-pen-fancy" aria-hidden="true"></i> Read Blog</a>
      </div>
    </div>
  </main>
</body>
</html>
